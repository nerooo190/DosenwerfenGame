<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
  <meta name="description" content="Dosenwerfen – A modern HTML5 carnival can-throwing game with unlockable skins and themes." />
  <title>🎯 Dosenwerfen – Can Knockdown Game</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <script type="module">
    import Storage from './js/storage.js';
    import { Game } from './js/game.js';
    import { UI } from './js/ui.js';
    import Audio from './js/audio.js';

    // ── Init ──────────────────────────────────────────────────────────────────
    const storage = Storage;
    storage.load();

    // Apply SFX setting
    Audio.enabled = storage.get('sfxEnabled') !== false;

    const canvas = document.getElementById('game-canvas');
    const game = new Game(canvas, storage);
    const ui = new UI(storage, game);

    // Show main menu on start
    ui._showMenu();

    // HUD update loop
    setInterval(() => ui.tick(), 250);

    // Unlock the Web Audio context on first user interaction (browser policy)
    const unlockAudio = () => {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      ctx.resume();
      document.removeEventListener('click', unlockAudio);
      document.removeEventListener('touchstart', unlockAudio);
    };
    document.addEventListener('click', unlockAudio, { once: true });
    document.addEventListener('touchstart', unlockAudio, { once: true });

    // ── Dev cheat (Ctrl+Shift+G = add 500 coins for testing) ─────────────────
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.shiftKey && e.key === 'G') {
        storage.addCoins(500);
        console.log('🪙 +500 coins added (dev cheat)');
      }
    });
  </script>
</body>
</html>
